<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RiderOps — Ground Operations Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#080c16;
  --bg2:#0d1424;
  --card:#111827;
  --card2:#161f32;
  --border:#1e2d47;
  --border2:#253550;
  --text:#f0f4ff;
  --text2:#8899bb;
  --text3:#4a5f82;

  --primary:#3b82f6;
  --primary-glow:rgba(59,130,246,.15);

  --green:#10b981;
  --green-bg:rgba(16,185,129,.12);

  --yellow:#f59e0b;
  --yellow-bg:rgba(245,158,11,.12);

  --red:#ef4444;
  --red-bg:rgba(239,68,68,.12);

  --cyan:#22d3ee;

  --radius:12px;

  --font:'Plus Jakarta Sans',sans-serif;
  --mono:'DM Mono',monospace;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}

header{
  position:sticky;top:0;z-index:999;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(8,12,22,.92);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
}

.logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;}
.logo-dot{width:10px;height:10px;border-radius:50%;background:var(--primary);box-shadow:0 0 18px var(--primary);}
.logo span{color:var(--primary);}

.header-right{display:flex;align-items:center;gap:12px;}
.last-updated{font-size:11px;color:var(--text3);font-family:var(--mono);}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.refresh-btn{
  border:none;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:8px;
  background:var(--card2);border:1px solid var(--border);
  color:var(--text2);font-family:var(--font);font-size:12px;font-weight:600;
  transition:.2s;
}
.refresh-btn:hover{background:var(--border2);color:var(--text);}
.refresh-btn svg{width:14px;height:14px;}

nav{
  display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;
  background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;
}
nav::-webkit-scrollbar{display:none;}

.tab-btn{
  border:none;background:none;color:var(--text3);
  display:flex;align-items:center;gap:8px;
  padding:15px 16px;font-size:13px;font-weight:700;font-family:var(--font);
  cursor:pointer;border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;
}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary);}

main{flex:1;width:100%;max-width:1700px;margin:0 auto;padding:24px;}

.state-box{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:90px 20px;text-align:center;color:var(--text2);
}

.spinner{
  width:42px;height:42px;border-radius:50%;
  border:3px solid var(--border);border-top-color:var(--primary);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.state-box h3{font-size:16px;}
.state-box p{font-size:13px;max-width:420px;}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px;}

.kpi-card{
  position:relative;overflow:hidden;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;
}
.kpi-card::before{content:'';position:absolute;left:0;top:0;right:0;height:2px;}
.kpi-card.blue::before{background:var(--primary);}
.kpi-card.green::before{background:var(--green);}
.kpi-card.yellow::before{background:var(--yellow);}
.kpi-card.red::before{background:var(--red);}
.kpi-card.cyan::before{background:var(--cyan);}

.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:10px;font-weight:700;}
.kpi-value{font-size:32px;font-weight:800;line-height:1;letter-spacing:-1px;margin-bottom:6px;}
.kpi-sub{font-size:12px;color:var(--text2);}

.kpi-card.blue .kpi-value{color:var(--primary);}
.kpi-card.green .kpi-value{color:var(--green);}
.kpi-card.yellow .kpi-value{color:var(--yellow);}
.kpi-card.red .kpi-value{color:var(--red);}
.kpi-card.cyan .kpi-value{color:var(--cyan);}

.panel,.chart-card,.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);}
.panel,.chart-card{padding:20px;}

.section{margin-bottom:24px;}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.section-title{font-size:15px;font-weight:800;}
.section-sub{font-size:12px;color:var(--text3);margin-top:2px;}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}

@media(max-width:980px){.grid-2,.grid-3{grid-template-columns:1fr;}}

.table-toolbar{
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  padding:14px 16px;border-bottom:1px solid var(--border);
}
.table-scroll{overflow:auto;}

.data-table{width:100%;border-collapse:collapse;font-size:13px;}
.data-table th{
  background:var(--bg2);color:var(--text3);text-align:left;
  font-size:11px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;
  padding:12px 14px;border-bottom:1px solid var(--border);white-space:nowrap;
}
.data-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(255,255,255,.02);}

.search-input,.filter-select{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  border-radius:8px;outline:none;font-family:var(--font);transition:.2s;
}
.search-input{width:240px;padding:8px 12px;font-size:13px;}
.search-input::placeholder{color:var(--text3);}
.search-input:focus,.filter-select:focus{border-color:var(--primary);}
.filter-select{padding:8px 12px;cursor:pointer;font-size:12px;color:var(--text2);}

.row-count{margin-left:auto;color:var(--text3);font-size:12px;}

.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-blue{background:var(--primary-glow);color:var(--primary);}
.badge-gray{background:rgba(100,120,160,.15);color:var(--text2);}

.progress-bar{width:100%;height:6px;background:var(--border);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;border-radius:999px;}
.progress-label{display:flex;align-items:center;gap:8px;}
.progress-label span{font-size:12px;font-weight:700;}

.bar-chart{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.bar-row{display:flex;align-items:center;gap:10px;}
.bar-row-label{width:90px;text-align:right;color:var(--text2);font-size:12px;}
.bar-track{flex:1;height:22px;border-radius:5px;overflow:hidden;background:var(--border);}
.bar-fill{
  height:100%;display:flex;align-items:center;justify-content:flex-end;
  padding-right:8px;font-size:11px;font-weight:700;transition:width .5s ease;
}
.bar-fill.blue{background:linear-gradient(90deg,#1d4ed8,var(--primary));color:#fff;}
.bar-fill.green{background:linear-gradient(90deg,#047857,var(--green));color:#fff;}
.bar-fill.yellow{background:linear-gradient(90deg,#d97706,var(--yellow));color:#fff;}
.bar-fill.red{background:linear-gradient(90deg,#b91c1c,var(--red));color:#fff;}

.empty-msg{padding:40px;text-align:center;color:var(--text3);font-size:13px;}
.att-p{color:var(--green);font-weight:700;}
.att-a{color:var(--red);font-weight:700;}
.att-o{color:var(--text3);font-weight:700;}
.rank-1{color:#ffd700;}
.rank-2{color:#c0c0c0;}
.rank-3{color:#cd7f32;}

.zone-card{background:var(--card2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.zone-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.zone-name{font-size:14px;font-weight:800;}
.zone-count{font-size:11px;color:var(--text3);}
.zone-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.zone-stat{font-size:11px;color:var(--text3);}
.zone-stat strong{display:block;margin-top:3px;color:var(--text);font-size:15px;}
</style>
</head>

<body>
<div class="app">

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Rider<span>Ops</span>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <div class="last-updated" id="lastUpdated">Connecting to Google Sheets...</div>
    <button class="refresh-btn" onclick="loadData()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
        <path d="M1 4v6h6"/>
        <path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"/>
        <path d="M23 14l-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('overview',this)">Overview</button>
  <button class="tab-btn" onclick="switchTab('riders',this)">Riders</button>
  <button class="tab-btn" onclick="switchTab('attendance',this)">Attendance</button>
  <button class="tab-btn" onclick="switchTab('compliance',this)">Compliance</button>
  <button class="tab-btn" onclick="switchTab('leaderboard',this)">Leaderboard</button>
  <button class="tab-btn" onclick="switchTab('zones',this)">Zones</button>
</nav>

<main id="mainContent">
  <div class="state-box">
    <div class="spinner"></div>
    <h3>Loading live rider data...</h3>
    <p>Fetching latest information from Google Sheets</p>
  </div>
</main>

</div>

<script>
/* =========================================================
   CONFIG — paste your published CSV link here
========================================================= */
const SHEET_URL = "https://corsproxy.io/?url=" + encodeURIComponent(
  "https://script.google.com/macros/s/AKfycbwpDomyJIhMHgTkbqfJ-2Fgd_lotz6104XIEtYgmlrJU1RNyIQJGJvBaQ11ZrtpZTm6/exec"
);

/* =========================================================
   STATE
========================================================= */
let riders = [];
let currentTab = 'overview';

/* =========================================================
   HELPERS
========================================================= */
function avg(arr, key){
  if(!arr.length) return 0;
  return Math.round(arr.reduce((s,r)=>s+(parseFloat(r[key])||0),0)/arr.length);
}

function statusBadge(status){
  if(status==='active')   return `<span class="badge badge-green"><span class="badge-dot"></span>Active</span>`;
  if(status==='warning')  return `<span class="badge badge-yellow"><span class="badge-dot"></span>Warning</span>`;
  if(status==='critical') return `<span class="badge badge-red"><span class="badge-dot"></span>Critical</span>`;
  return `<span class="badge badge-gray">${status}</span>`;
}

function sopBadge(sop){
  if(sop.includes('BREACH'))  return `<span class="badge badge-red">Breach</span>`;
  if(sop.includes('REVIEW'))  return `<span class="badge badge-yellow">Review</span>`;
  return `<span class="badge badge-green">Compliant</span>`;
}

/* =========================================================
   TAB SWITCHING
========================================================= */
function switchTab(tab, btn){
  currentTab = tab;

  // Update active nav button
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');

  renderTab(tab);
}

function renderTab(tab){
  let html = '';
  if(tab === 'overview')    html = renderOverview();
  else if(tab === 'riders') html = renderRiders();
  else if(tab === 'attendance') html = renderAttendance();
  else if(tab === 'compliance') html = renderCompliance();
  else if(tab === 'leaderboard') html = renderLeaderboard();
  else if(tab === 'zones')  html = renderZones();

  document.getElementById('mainContent').innerHTML = html;
}

/* =========================================================
   CSV PARSER
========================================================= */
function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];

  const headers = lines[0].split(',').map(h =>
    h.trim().replace(/^"|"$/g,'').toLowerCase().replace(/\s+/g,'_')
  );

  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h,i)=>{
      obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,'');
    });
    return obj;
  }).filter(r => Object.values(r).some(v => v !== ''));
}

function parseCSVLine(line){
  const result = [];
  let current = '';
  let inQuotes = false;
  for(let i=0;i<line.length;i++){
    const char = line[i];
    if(char==='"'){ inQuotes=!inQuotes; }
    else if(char===',' && !inQuotes){ result.push(current); current=''; }
    else{ current+=char; }
  }
  result.push(current);
  return result;
}

/* =========================================================
   MAP ROW
========================================================= */
function mapRow(row){
  const id   = row['rider_id'] || '';
  const name = row['name']     || 'Unknown';
  const zone = row['zone']     || '—';

  // Count attendance across all 31 days
  let present=0, absent=0, late=0, notSched=0, scheduled=0;
  for(let d=1;d<=31;d++){
    const key = 'd'+String(d).padStart(2,'0');
    const val = (row[key]||'').trim().toUpperCase();
    if(!val) continue;
    if(val==='S'){ notSched++; continue; }
    scheduled++;
    if(val==='P') present++;
    else if(val==='L'){ present++; late++; }
    else if(val==='A') absent++;
  }

  const rate = scheduled>0 ? Math.round((present/scheduled)*100) : 0;

  // Today's status (uses day-of-month, so works while sheet is current month)
  const todayDay = new Date().getDate();
  const todayKey = 'd'+String(todayDay).padStart(2,'0');
  const todayVal = (row[todayKey]||'S').trim().toUpperCase();

  let attendance = 'Present';
  if(todayVal==='A')      attendance='Absent';
  else if(todayVal==='L') attendance='Late';
  else if(todayVal==='S') attendance='Off Shift';

  let status = 'active';
  if(rate < 90)      status='critical';
  else if(rate < 95) status='warning';

  let sop = 'SOP COMPLIANT';
  if(absent>=3)                  sop='SOP BREACH — Escalate';
  else if(absent>=1 || late>=2)  sop='SOP REVIEW REQUIRED';

  let action = 'No action required';
  if(status==='critical') action='URGENT: Poor attendance — immediate escalation required.';
  else if(status==='warning') action='WARNING: Monitor attendance closely.';

  return {
    id, name, zone,
    fill: rate,        // attendance rate → used as fill rate
    eff:  rate,
    orders: present,   // days present → used as orders
    attendance, uniform: true, sop, status, action, phone:'',
    present, absent, late, notSched, rate
  };
}
/* =========================================================
   LOAD DATA
========================================================= */
async function loadData() {
  const SHEET_URL = "https://script.google.com/macros/s/AKfycbwpDomyJIhMHgTkbqfJ-2Fgd_lotz6104XIEtYgmlrJU1RNyIQJGJvBaQ11ZrtpZTm6/exec";
  
  document.getElementById('lastUpdated').textContent = 'Refreshing...';
  document.getElementById('mainContent').innerHTML = `
    <div class="state-box">
      <div class="spinner"></div>
      <h3>Fetching from Google Sheets...</h3>
      <p>Pulling live rider operations data</p>
    </div>`;

  try {
    // Updated fetch block as recommended in image_819cdb.png and image_819d33.png
    const res = await fetch(SHEET_URL, {
      method: 'GET',
      redirect: 'follow', // Essential for Apps Script redirects
      cache: 'no-store'
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);

    const text = await res.text();

    if (!text || text.trim() === '') throw new Error('Google Sheet returned empty data');

    const rows = parseCSV(text);

    riders = rows
      .map(mapRow)
      .filter(r => r.name !== 'Unknown' || r.id !== '');

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `Updated ${now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;

    renderTab(currentTab);

  } catch (err) {
    console.error(err);
    document.getElementById('lastUpdated').textContent = 'Load failed';
    document.getElementById('mainContent').innerHTML = `
      <div class="state-box">
        <h3>Could not load data</h3>
        <p>${err.message}</p>
        <br>
        <button class="refresh-btn" onclick="loadData()">Retry</button>
      </div>`;
  }
}
/* =========================================================
   OVERVIEW
========================================================= */
function renderOverview(){
  const total    = riders.length;
  const active   = riders.filter(r=>r.status==='active').length;
  const warning  = riders.filter(r=>r.status==='warning').length;
  const critical = riders.filter(r=>r.status==='critical').length;
  const avgFill  = avg(riders,'fill');
  const totalOrders = riders.reduce((s,r)=>s+r.orders,0);

  const zoneMap = {};
  riders.forEach(r=>{
    if(!zoneMap[r.zone]) zoneMap[r.zone]={count:0,fill:0,orders:0};
    zoneMap[r.zone].count++;
    zoneMap[r.zone].fill+=r.fill;
    zoneMap[r.zone].orders+=r.orders;
  });
  const zones = Object.entries(zoneMap);
  const maxOrders = Math.max(...zones.map(z=>z[1].orders),1);

  return `
  <div class="kpi-grid section">
    <div class="kpi-card blue"><div class="kpi-label">Total Riders</div><div class="kpi-value">${total}</div><div class="kpi-sub">Live fleet size</div></div>
    <div class="kpi-card green"><div class="kpi-label">Active</div><div class="kpi-value">${active}</div><div class="kpi-sub">Meeting targets</div></div>
    <div class="kpi-card yellow"><div class="kpi-label">Warning</div><div class="kpi-value">${warning}</div><div class="kpi-sub">Needs monitoring</div></div>
    <div class="kpi-card red"><div class="kpi-label">Critical</div><div class="kpi-value">${critical}</div><div class="kpi-sub">Immediate action</div></div>
    <div class="kpi-card cyan"><div class="kpi-label">Avg Attendance</div><div class="kpi-value">${avgFill}%</div><div class="kpi-sub">Monthly average</div></div>
    <div class="kpi-card blue"><div class="kpi-label">Total Present Days</div><div class="kpi-value">${totalOrders}</div><div class="kpi-sub">Across all riders</div></div>
  </div>
  
  <div class="grid-2 section">
    <div class="chart-card">
      <div class="section-header">
        <div><div class="section-title">Zone Fill Rates</div><div class="section-sub">Average performance per zone</div></div>
      </div>
      <div class="bar-chart">
        ${zones.map(([zone,d])=>{
          const fr=Math.round(d.fill/d.count);
          return `<div class="bar-row">
            <div class="bar-row-label">${zone}</div>
            <div class="bar-track">
              <div class="bar-fill ${fr>=85?'green':fr>=75?'yellow':'red'}" style="width:${fr}%">${fr}%</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="chart-card">
      <div class="section-header">
        <div><div class="section-title">Orders by Zone</div><div class="section-sub">Daily order volume</div></div>
      </div>
      <div class="bar-chart">
        ${zones.map(([zone,d])=>{
          const pct=Math.round((d.orders/maxOrders)*100);
          return `<div class="bar-row">
            <div class="bar-row-label">${zone}</div>
            <div class="bar-track">
              <div class="bar-fill blue" style="width:${pct}%">${d.orders}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
}

/* =========================================================
   RIDERS
========================================================= */
function renderRiders(){
  return `
  <div class="table-wrap">
    <div class="table-toolbar">
      <input id="searchInput" class="search-input" placeholder="Search riders..." oninput="updateRidersTable()">
      <select id="statusFilter" class="filter-select" onchange="updateRidersTable()">
        <option value="all">All Status</option>
        <option value="active">Active</option>
        <option value="warning">Warning</option>
        <option value="critical">Critical</option>
      </select>
      <span class="row-count" id="riderCount">${riders.length} riders</span>
    </div>
    <div class="table-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th>Rider</th><th>Zone</th><th>Fill Rate</th>
            <th>Efficiency</th><th>Orders</th><th>Attendance</th>
            <th>Status</th><th>SOP</th>
          </tr>
        </thead>
        <tbody id="ridersTableBody">${renderRiderRows(riders)}</tbody>
      </table>
    </div>
  </div>`;
}

function renderRiderRows(rows){
  if(!rows.length) return `<tr><td colspan="8"><div class="empty-msg">No riders found</div></td></tr>`;

  return rows.map(r=>`
    <tr>
      <td>
        <div style="font-weight:700">${r.name}</div>
        ${r.id?`<div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${r.id}</div>`:''}
      </td>
      <td>${r.zone}</td>
      <td>
        <div class="progress-label">
          <div class="progress-bar" style="width:70px">
            <div class="progress-fill" style="width:${r.fill}%;background:${r.fill>=85?'var(--green)':r.fill>=75?'var(--yellow)':'var(--red)'}"></div>
          </div>
          <span>${r.fill}%</span>
        </div>
      </td>
      <td><span style="font-weight:700;color:var(--cyan)">${r.eff}%</span></td>
      <td><strong>${r.orders}</strong></td>
      <td><span class="${r.attendance==='Present'?'att-p':r.attendance==='Absent'?'att-a':'att-o'}">${r.attendance}</span></td>
      <td>${statusBadge(r.status)}</td>
      <td>${sopBadge(r.sop)}</td>
    </tr>
  `).join('');
}

function updateRidersTable(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;

  let rows = [...riders];
  if(status!=='all') rows=rows.filter(r=>r.status===status);
  if(q) rows=rows.filter(r=>(r.name+r.id+r.zone).toLowerCase().includes(q));

  document.getElementById('ridersTableBody').innerHTML = renderRiderRows(rows);
  document.getElementById('riderCount').textContent = rows.length + ' riders';
}

/* =========================================================
   ATTENDANCE
========================================================= */
function renderAttendance(){
  const present = riders.filter(r=>r.attendance==='Present').length;
  const absent  = riders.filter(r=>r.attendance==='Absent').length;
  const off     = riders.filter(r=>r.attendance==='Off Shift').length;
  const leave   = riders.filter(r=>r.attendance==='Leave').length;

  const attRows = riders.map(r=>`
    <tr>
      <td><div style="font-weight:700">${r.name}</div>${r.id?`<div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${r.id}</div>`:''}</td>
      <td>${r.zone}</td>
      <td><span class="${r.attendance==='Present'?'att-p':r.attendance==='Absent'?'att-a':'att-o'}">${r.attendance}</span></td>
    </tr>`).join('');

  return `
  <div class="kpi-grid section">
    <div class="kpi-card green"><div class="kpi-label">Present</div><div class="kpi-value">${present}</div><div class="kpi-sub">On duty today</div></div>
    <div class="kpi-card red"><div class="kpi-label">Absent</div><div class="kpi-value">${absent}</div><div class="kpi-sub">No-show</div></div>
    <div class="kpi-card yellow"><div class="kpi-label">Off Shift</div><div class="kpi-value">${off}</div><div class="kpi-sub">Scheduled off</div></div>
    <div class="kpi-card blue"><div class="kpi-label">On Leave</div><div class="kpi-value">${leave}</div><div class="kpi-sub">Approved leave</div></div>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table class="data-table">
        <thead><tr><th>Rider</th><th>Zone</th><th>Status</th></tr></thead>
        <tbody>${attRows}</tbody>
      </table>
    </div>
  </div>`;
}

/* =========================================================
   COMPLIANCE
========================================================= */
function renderCompliance(){
  const breach  = riders.filter(r=>r.sop.includes('BREACH'));
  const review  = riders.filter(r=>r.sop.includes('REVIEW'));
  const ok      = riders.filter(r=>r.sop==='SOP COMPLIANT');

  const noUniform = riders.filter(r=>!r.uniform && r.attendance==='Present');

  return `
  <div class="kpi-grid section">
    <div class="kpi-card red"><div class="kpi-label">SOP Breaches</div><div class="kpi-value">${breach.length}</div><div class="kpi-sub">Immediate escalation</div></div>
    <div class="kpi-card yellow"><div class="kpi-label">Review Required</div><div class="kpi-value">${review.length}</div><div class="kpi-sub">Needs follow-up</div></div>
    <div class="kpi-card green"><div class="kpi-label">Compliant</div><div class="kpi-value">${ok.length}</div><div class="kpi-sub">Meeting all standards</div></div>
    <div class="kpi-card yellow"><div class="kpi-label">Uniform Issues</div><div class="kpi-value">${noUniform.length}</div><div class="kpi-sub">Non-compliant uniform</div></div>
  </div>

  <div class="grid-2">
    <div class="panel">
      <div class="section-header"><div class="section-title">SOP Breaches</div></div>
      ${breach.length
        ? breach.map(r=>`
          <div style="padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="font-weight:700">${r.name}</div>
            <div style="font-size:12px;color:var(--text2)">${r.zone} · Fill ${r.fill}%</div>
            <div style="font-size:11px;color:var(--red);margin-top:4px">${r.action}</div>
          </div>`).join('')
        : `<div class="empty-msg">No SOP breaches ✓</div>`}
    </div>

    <div class="panel">
      <div class="section-header"><div class="section-title">Review Required</div></div>
      ${review.length
        ? review.map(r=>`
          <div style="padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="font-weight:700">${r.name}</div>
            <div style="font-size:12px;color:var(--text2)">${r.zone} · Fill ${r.fill}% · Uniform: ${r.uniform?'✓':'✗'}</div>
          </div>`).join('')
        : `<div class="empty-msg">No review cases</div>`}
    </div>
  </div>`;
}

/* =========================================================
   LEADERBOARD
========================================================= */
function renderLeaderboard(){
  const topFill = [...riders].sort((a,b)=>b.fill-a.fill).slice(0,10);
  const topOrders = [...riders].sort((a,b)=>b.orders-a.orders).slice(0,10);

  const medalClass = i => i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'';
  const medal = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1;

  return `
  <div class="grid-2">
    <div class="panel">
      <div class="section-header"><div><div class="section-title">Top Fill Rates</div><div class="section-sub">Best performing riders</div></div></div>
      <table class="data-table">
        <thead><tr><th>#</th><th>Rider</th><th>Zone</th><th>Fill Rate</th></tr></thead>
        <tbody>
          ${topFill.map((r,i)=>`
            <tr>
              <td class="${medalClass(i)}">${medal(i)}</td>
              <td>${r.name}</td>
              <td>${r.zone}</td>
              <td><strong style="color:var(--green)">${r.fill}%</strong></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="panel">
      <div class="section-header"><div><div class="section-title">Top Orders Delivered</div><div class="section-sub">Highest order count today</div></div></div>
      <table class="data-table">
        <thead><tr><th>#</th><th>Rider</th><th>Zone</th><th>Orders</th></tr></thead>
        <tbody>
          ${topOrders.map((r,i)=>`
            <tr>
              <td class="${medalClass(i)}">${medal(i)}</td>
              <td>${r.name}</td>
              <td>${r.zone}</td>
              <td><strong style="color:var(--cyan)">${r.orders}</strong></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

/* =========================================================
   ZONES
========================================================= */
function renderZones(){
  const zoneMap = {};
  riders.forEach(r=>{
    if(!zoneMap[r.zone]) zoneMap[r.zone]=[];
    zoneMap[r.zone].push(r);
  });

  return `
  <div class="kpi-grid">
    ${Object.entries(zoneMap).map(([zone,rs])=>{
      const fill   = avg(rs,'fill');
      const eff    = avg(rs,'eff');
      const orders = rs.reduce((s,r)=>s+r.orders,0);
      const present = rs.filter(r=>r.attendance==='Present').length;

      return `
        <div class="zone-card">
          <div class="zone-card-header">
            <div class="zone-name">${zone}</div>
            <div class="zone-count">${rs.length} riders</div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width:${fill}%;background:${fill>=85?'var(--green)':fill>=75?'var(--yellow)':'var(--red)'}"></div>
          </div>
          <div class="zone-stats">
            <div class="zone-stat">Avg Fill<strong>${fill}%</strong></div>
            <div class="zone-stat">Avg Efficiency<strong>${eff}%</strong></div>
            <div class="zone-stat">Orders<strong>${orders}</strong></div>
            <div class="zone-stat">Present<strong>${present}/${rs.length}</strong></div>
          </div>
        </div>`;
    }).join('')}
  </div>`;
}

/* =========================================================
   INIT
========================================================= */
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
