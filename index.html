<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Keeta Workforce</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
<script>
// ── Inline Mini Chart (no CDN needed) ───────────────────────
var Chart=(function(){
function clr(ctx,w,h){ctx.clearRect(0,0,w,h);}
function rnd(n){return Math.round(n);}

function drawChart(canvas,cfg){
  var ctx=canvas.getContext('2d');
  var W=canvas.width=canvas.offsetWidth||canvas.parentElement.offsetWidth||300;
  var H=canvas.height=canvas.offsetHeight||220;
  clr(ctx,W,H);

  var type=cfg.type||'bar';
  var datasets=cfg.data.datasets||[];
  var labels=cfg.data.labels||[];
  var opts=cfg.options||{};
  var scales=opts.scales||{};
  var yScale=scales.y||{};
  var y2Scale=scales.y2||null;

  // Compute bounds
  var PAD={top:16,right:y2Scale?45:16,bottom:32,left:44};
  var W2=W-PAD.left-PAD.right;
  var H2=H-PAD.top-PAD.bottom;
  if(W2<10||H2<10) return;

  // Gather all y-values for primary axis
  var allY=[];
  datasets.forEach(function(ds){
    if(ds.yAxisID==='y2') return;
    (ds.data||[]).forEach(function(v){if(v!=null)allY.push(v);});
  });
  var yMin=yScale.min!=null?yScale.min:Math.min.apply(null,allY.concat([0]));
  var yMax=yScale.max!=null?yScale.max:Math.max.apply(null,allY.concat([100]));
  if(yMax===yMin){yMax=yMin+1;}

  // y2 axis
  var allY2=[];
  datasets.forEach(function(ds){
    if(ds.yAxisID==='y2')(ds.data||[]).forEach(function(v){if(v!=null)allY2.push(v);});
  });
  var y2Min=0,y2Max=Math.max.apply(null,allY2.concat([1]));

  function fy(v,mn,mx){return PAD.top+H2-(v-mn)/(mx-mn)*H2;}
  function fx(i,n){return PAD.left+(i+0.5)*(W2/n);}
  function fxBar(i,n,di,nd,off){
    var bw=W2/n*0.7/Math.max(nd,1);
    return PAD.left+(i+0.5)*(W2/n)-bw*nd/2+di*bw+off;
  }

  // Draw grid
  ctx.strokeStyle='#e9ecef'; ctx.lineWidth=1;
  var steps=5;
  for(var s=0;s<=steps;s++){
    var yv=yMin+(yMax-yMin)*s/steps;
    var py=fy(yv,yMin,yMax);
    ctx.beginPath();ctx.moveTo(PAD.left,py);ctx.lineTo(W-PAD.right,py);ctx.stroke();
    ctx.fillStyle='#9ca3af';ctx.font='10px DM Sans,sans-serif';ctx.textAlign='right';
    var lbl=yScale.callback?yScale.callback(rnd(yv)):rnd(yv);
    ctx.fillText(lbl,PAD.left-4,py+3);
  }

  // x labels
  ctx.fillStyle='#9ca3af';ctx.font='9px DM Sans,sans-serif';ctx.textAlign='center';
  var maxLbls=Math.floor(W2/40);
  var step2=Math.max(1,Math.ceil(labels.length/maxLbls));
  labels.forEach(function(l,i){
    if(i%step2!==0) return;
    ctx.fillText(l,fx(i,labels.length),H-6);
  });

  // y2 axis labels
  if(y2Scale&&allY2.length){
    var y2steps=4;
    ctx.textAlign='left';ctx.fillStyle='#3B8FF3';
    for(var s=0;s<=y2steps;s++){
      var yv2=y2Min+(y2Max-y2Min)*s/y2steps;
      var py2=fy(yv2,y2Min,y2Max);
      var lbl2=y2Scale.callback?y2Scale.callback(rnd(yv2)):rnd(yv2);
      ctx.fillText(lbl2,W-PAD.right+4,py2+3);
    }
  }

  // Count bar datasets
  var barDS=datasets.filter(function(ds){return(ds.type||type)==='bar';});

  // Draw datasets
  datasets.forEach(function(ds,di){
    var data=ds.data||[];
    var isY2=ds.yAxisID==='y2';
    var mn=isY2?y2Min:yMin, mx=isY2?y2Max:yMax;
    var t=ds.type||type;
    var color=ds.borderColor||ds.backgroundColor||'#F29F67';

    if(t==='bar'){
      var bIdx=barDS.indexOf(ds);
      var bnd=barDS.length;
      var bW=W2/labels.length*0.72/Math.max(bnd,1);
      ctx.globalAlpha=0.85;
      data.forEach(function(v,i){
        if(v==null) return;
        var x=PAD.left+i*(W2/labels.length)+(W2/labels.length*0.14)+bIdx*bW;
        var y=fy(Math.max(v,mn),mn,mx);
        var barH=fy(mn,mn,mx)-y;
        var bg=Array.isArray(ds.backgroundColor)?ds.backgroundColor[i]:ds.backgroundColor;
        ctx.fillStyle=bg||'rgba(242,159,103,0.8)';
        ctx.beginPath();
        var r=ds.borderRadius||0;
        ctx.roundRect?ctx.roundRect(x,y,bW,barH,r):ctx.rect(x,y,bW,barH);
        ctx.fill();
      });
      ctx.globalAlpha=1;
    } else {
      // Line
      ctx.beginPath();
      ctx.strokeStyle=typeof color==='string'?color:'#F29F67';
      ctx.lineWidth=ds.borderWidth||2;
      if(ds.borderDash) ctx.setLineDash(ds.borderDash);
      else ctx.setLineDash([]);
      var first=true;
      data.forEach(function(v,i){
        if(v==null) return;
        var x=fx(i,data.length), y=fy(v,mn,mx);
        if(first){ctx.moveTo(x,y);first=false;}else ctx.lineTo(x,y);
      });
      ctx.stroke();
      ctx.setLineDash([]);

      // Fill
      if(ds.fill&&data.length){
        ctx.beginPath();
        var bg=ds.backgroundColor||'rgba(242,159,103,0.1)';
        ctx.fillStyle=bg;
        data.forEach(function(v,i){
          if(v==null) return;
          var x=fx(i,data.length),y=fy(v,mn,mx);
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        });
        var last=data.length-1;
        ctx.lineTo(fx(last,data.length),fy(mn,mn,mx));
        ctx.lineTo(fx(0,data.length),fy(mn,mn,mx));
        ctx.closePath();ctx.fill();
      }

      // Points
      var pr=ds.pointRadius!=null?ds.pointRadius:3;
      if(pr>0){
        data.forEach(function(v,i){
          if(v==null) return;
          ctx.beginPath();
          ctx.arc(fx(i,data.length),fy(v,mn,mx),pr,0,Math.PI*2);
          ctx.fillStyle=ds.pointBackgroundColor||ctx.strokeStyle;
          ctx.fill();
          if(ds.pointBorderColor){ctx.strokeStyle=ds.pointBorderColor;ctx.lineWidth=ds.pointBorderWidth||1;ctx.stroke();}
        });
      }
    }
  });
}

function ChartInst(canvas,cfg){
  this._canvas=canvas; this._cfg=cfg;
  if(canvas&&canvas.getContext) drawChart(canvas,cfg);
}
ChartInst.prototype.destroy=function(){
  if(this._canvas){var ctx=this._canvas.getContext('2d');ctx.clearRect(0,0,this._canvas.width,this._canvas.height);}
};
ChartInst.prototype.update=function(){if(this._canvas)drawChart(this._canvas,this._cfg);};

return function(canvas,cfg){return new ChartInst(canvas,cfg);};
})();
</script>
<style>
/* ── THEME CORE ─────────────────────────── */
:root{
  --p:#F29F67; --dk:#1E1E2C; --bl:#3B8FF3; --tl:#34B1AA; --gd:#E0B50F; --rd:#EF4444; 
  --gn:#22C55E; --am:#F59E0B; 
  --bg:#F4F6F9; --cd:#FFFFFF; --br:#E9ECEF; --t1:#1E1E2C; --t2:#6C757D;
}

[data-theme="dark"] {
  --bg:#0d1117; --cd:#161b22; --br:#30363d; --t1:#c9d1d9; --t2:#8b949e; --dk:#13131F;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;transition:0.2s ease;}

/* ── COMPONENTS ─────────────────────────── */
.hdr{background:var(--dk);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.kbadge{background:var(--p);color:var(--dk);font-family:'Syne',sans-serif;font-weight:800;font-size:15px;padding:5px 12px;border-radius:7px;letter-spacing:1px;}
.htitle{color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.hsub{color:#6C757D;font-size:11px;}
.ldot{width:8px;height:8px;border-radius:50%;background:var(--gn);animation:pulse 2s infinite;display:inline-block;margin-right:5px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ltext{color:#94a3b8;font-size:12px;}

.sbar{background:var(--dk);filter:brightness(1.2);padding:8px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;}
.sinfo{font-size:11px;color:#6C757D;}
.sbtn{padding:6px 16px;border-radius:6px;border:none;background:var(--p);color:var(--dk);font-size:12px;font-weight:700;}

.tabs{background:var(--cd);border-bottom:2px solid var(--br);display:flex;overflow-x:auto;padding:0 14px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:13px 14px;border:none;background:none;font-size:12px;font-weight:600;color:var(--t2);border-bottom:3px solid transparent;white-space:nowrap;margin-bottom:-2px;}
.tab.on{color:var(--p);border-bottom-color:var(--p);}

.wrap{padding:14px 16px 80px;}
.pg{display:none;}.pg.on{display:block;}

.card{background:var(--cd);border-radius:12px;border:1px solid var(--br);padding:16px;margin-bottom:12px;}
.ct{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:3px;color:var(--t1);}
.cs{font-size:11px;color:var(--t2);margin-bottom:12px;}

.kg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.kc{background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:14px;border-top:4px solid var(--a,#ccc);}
.kl{font-size:10px;color:var(--t2);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.kv{font-size:28px;font-weight:300;font-family:'Inter',sans-serif;line-height:1;letter-spacing:-1px;color:var(--t1);}

.ptb.on{background:var(--cd);color:var(--t1);box-shadow:0 1px 6px rgba(0,0,0,.1);}
.srch{background:var(--cd);color:var(--t1);width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--br);font-size:16px;margin-bottom:10px;}
.rc, .lbc, .zc2{background:var(--cd);border:1px solid var(--br);color:var(--t1);}

.theme-btn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
  color: #fff; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
}

/* Original rest of styles preserved... */
.mts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.mt{text-align:center;background:var(--bg);border-radius:8px;padding:8px 4px;}
.addbtn{width:100%;padding:14px;border-radius:12px;border:none;background:var(--p);color:var(--dk);font-size:15px;font-weight:700;margin-bottom:12px;}
.frow2{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.fb{padding:7px 14px;border-radius:99px;border:1.5px solid var(--br);background:var(--cd);color:var(--t2);font-size:12px;white-space:nowrap;}
.fb.on{background:var(--dk);color:#fff;border-color:var(--dk);}
.fwp{position:fixed;bottom:0;left:0;right:0;background:var(--cd);border-radius:20px 20px 0 0;z-index:999;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s ease;}
.fwp.on{transform:translateY(0);}
.fin,.fsl{width:100%;padding:13px 12px;border-radius:10px;border:1.5px solid var(--br);font-size:16px;color:var(--t1);background:var(--cd);display:block;}
@media(min-width:600px){.kg{grid-template-columns:repeat(3,1fr);}.wrap{padding:18px 24px 60px;}}
</style>

<script>
// ── THEME LOGIC ───────────────────────
function toggleTheme() {
  const root = document.documentElement;
  const btn = document.getElementById('t-btn');
  const isDark = root.getAttribute('data-theme') === 'dark';
  
  if (isDark) {
    root.removeAttribute('data-theme');
    btn.innerHTML = '🌙 Dark';
    localStorage.setItem('keeta-theme', 'light');
  } else {
    root.setAttribute('data-theme', 'dark');
    btn.innerHTML = '☀️ Light';
    localStorage.setItem('keeta-theme', 'dark');
  }
}

// ── INITIAL LOAD ───────────────────────
window.onload = function() {
  // Load Theme
  const savedTheme = localStorage.getItem('keeta-theme') || 'dark';
  if (savedTheme === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('t-btn').innerHTML = '☀️ Light';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('t-btn').innerHTML = '🌙 Dark';
  }

  // Start your original clock and sync
  updateTime();
  setInterval(updateTime, 1000);
  doSync(); 
};

function updateTime() {
  const n = new Date();
  document.getElementById('ltime').innerText = n.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

// ── YOUR ORIGINAL DASHBOARD LOGIC (Preserved Exactly) ──────────
// ... Copy/Paste your original doSync, processCSV, renderRiders, etc. here ...
</script>
</body>
